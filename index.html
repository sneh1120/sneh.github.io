<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Tester</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:350px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.input-box{
    position:relative;
}

input{
    width:100%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:8px;
    outline:none;
    font-size:16px;
}

button{
    position:absolute;
    right:10px;
    top:10px;
    border:none;
    background:none;
    cursor:pointer;
}

.strength-bar{
    width:100%;
    height:10px;
    background:#ddd;
    border-radius:10px;
    margin-top:15px;
    overflow:hidden;
}

.bar{
    height:100%;
    width:0%;
    transition:0.4s;
}

#message{
    margin-top:10px;
    font-weight:bold;
    text-align:center;
}
</style>
</head>
<body>

<div class="container">
    <h2>Password Tester</h2>

    <div class="input-box">
        <input type="password" id="password" placeholder="Enter password">
        <button onclick="togglePassword()">👁</button>
    </div>

    <div class="strength-bar">
        <div class="bar" id="bar"></div>
    </div>

    <p id="message"></p>
</div>

<script>
const password = document.getElementById("password");
const bar = document.getElementById("bar");
const message = document.getElementById("message");

password.addEventListener("input", () => {
    let val = password.value;
    let strength = 0;

    if(val.length >= 8) strength++;
    if(/[A-Z]/.test(val)) strength++;
    if(/[0-9]/.test(val)) strength++;
    if(/[@$!%*?&]/.test(val)) strength++;

    if(val.length === 0){
        bar.style.width = "0%";
        message.innerHTML = "";
    }
    else if(strength <= 1){
        bar.style.width = "25%";
        bar.style.background = "red";
        message.innerHTML = "Weak Password";
    }
    else if(strength == 2 || strength == 3){
        bar.style.width = "60%";
        bar.style.background = "orange";
        message.innerHTML = "Medium Password";
    }
    else{
        bar.style.width = "100%";
        bar.style.background = "green";
        message.innerHTML = "Strong Password";
    }
});

function togglePassword(){
    if(password.type === "password"){
        password.type = "text";
    } else {
        password.type = "password";
    }
}
</script>

</body>
</html>
